name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        python -m pytest tests/ -q --tb=short

    - name: Verify imports
      run: |
        python -c "from src.grid_manager import GridManager; print('✅ Core imports OK')"
        python -c "from src.column_placer import ColumnPlacer; print('✅ Column placer OK')"
        python -c "from src.auto_framer import AutoFramer; print('✅ Auto framer OK')"
